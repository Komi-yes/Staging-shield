# Ejemplo de archivo de revisión manual.
#
# Uso:
#   staging-shield scan --config examples/config.yaml --review examples/review.yaml
#
# El reporte HTML también permite generar este archivo de forma interactiva:
# pulse "Exportar revisión" en el centro de revisión del reporte y guarde el
# YAML descargado.
#
# Reglas:
#   - Solo afectan a SVR en estado "manual" o "falta de evidencia".
#     Las reglas que el motor ya resolvió automáticamente NO se sobreescriben
#     a menos que use el sufijo "_force" en el status (uso avanzado, no se
#     recomienda salvo para excepciones documentadas).
#
#   - Valores válidos del status:
#       cumple
#       cumple_parcial   (equivalente: parcial)
#       no_cumple        (equivalente: nocumple)
#       no_aplica        (la regla no aplica al stack del entorno; no entra al cálculo)
#
#   - Las SVR críticas que se marquen como "no_cumple" bloquean la promoción
#     del entorno (Apto = 0), igual que si las hubiera detectado el motor.

reviewer: "Daniel Palacios"
timestamp: 2026-04-28T15:00:00Z

